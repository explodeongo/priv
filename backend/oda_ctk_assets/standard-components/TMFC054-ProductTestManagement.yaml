      - url: https://tmf-open-api-table-documents.s3.eu-west-1.amazonaws.com/Beta/TMF669_Party_Role/4.1.0/swagger/TMF669_Party_Role_Management_API_v4.1.0_beta_swagger.json
        version: v4.0.0
      resources:
      - partyRole:
        - GET
        - GET /id
    - id: TMF653
      apiType: openapi
      apiSDO: tmForum
      name: service-test-management-api
      required: false
      specification:
