  componentMetadata:
    id: TMFC055
    name: ServiceTestManagement
    eTOMs:
    - 1.4.1|Service_Strategy_Management|v24.5
    - 1.4.1.8|Service_Test_Strategy|v24.5
    owners:
    - url: Redacted
      name: Redacted
      email: Redacted
    status: specified
    version: 1.0.0
    description: 'Service Test Management is responsible for managing the service
      test specification and executing tests based on this specification to ensure
      the service operates correctly.


      Service test specification involves capturing potential tests for each Service
      Specification that can be initiated either automatically or manually by the
      service user. These tests are derived from those available at the service specification
      or resource specification level.


      The scope of the component includes the end-to-end execution and reporting of
      tests, tailored to the specific context and actor involved.'
    maintainers:
    - url: Redacted
      name: Redacted
      email: components@tmforum.org
    functionalBlock: Production
    publicationDate: 2025-07-16
    functionalFrameworkFunctions:
    - 625|Service_Test_Operation_Control|v24.0
    - 1136|Service_Test_Specification_and_Scenario_Management|v24.0
    - 566|Service_Test_Result_Analysis_Policy_Configuration|v24.0
    - 573|Service_Testing_Rules_Management|v24.0
    - 581|Automated_Service_Test_Invocation|v24.0
    - 1138|Service_Test_Reporting_Rules_Management|v24.0
    - 582|Manual_Service_Test_Invocation|v24.0
    - 627|Service_Test_Strategy_Management|v24.0
    - 1137|Service_Test_Rules_Management|v24.0
    - 575|Service_Test_Results_Reporting|v24.0
    - 626|Service_Testing_Management|v24.0
    - 577|Service_End_to_End_Test_Scheduling|v24.0
    - 579|Service_End_to_End_Testing|v24.0
    SIDs:
    - Service_Domain|Service_Test_ABE|ServiceTest_BE|v25.0
    - Service_Domain|Service_Test_ABE|ServiceTestSpec_BE|v25.0
