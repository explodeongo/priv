  componentMetadata:
    id: TMFC040
    name: ProductUsageManagement
    version: 1.1.0
    description: Product Usage Management component provides a standardized mechanism
      for creation, update, retrieval, import and export of a collection of usages.
      It allows a service provider to retrieve usage generated by a partner service
      platform in order to rate it, and provides rated usage to a partner for consumption
      follow-up purposes.
    publicationDate: 2024-10-22
    status: specified
    functionalBlock: CoreCommerce
    owners:
    - email: Redacted
      name: Redacted
      url: Redacted
    maintainers:
    - name: Redacted
      email: components@tmforum.org
      url: Redacted
    eTOMs:
    - 1.2.16|Product_Usage_Management|v23.0
    - 1.2.16.1|Product_Usages|v23.0
    - 1.2.16.1.1|Add_Product_Usage_Data|v23.0
