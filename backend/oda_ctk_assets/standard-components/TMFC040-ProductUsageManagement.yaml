    - 1.2.16.3|Mediate_Product_Usages|v23.0
    - 1.2.16.3.1|Edit_Product_Usages|v23.0
    - 1.2.16.3.2|Reformat_Product_Usages|v23.0
    - 1.2.16.4|Report_Product_Usage_Records|v23.0
    - 1.2.16.4.1|Generate_Product_Usage_Report|v23.0
    - 1.2.16.4.2|Investigate_Product_Usage_Related_Problem|v23.0
    - 1.2.16.4.3|Support_Product_Usage_Related_Process|v23.0
    - 1.2.17|Product_Rating_&_Rate_Assignment|v23.0
    - 1.2.17.1|Perform_Rating|v23.0
    - 1.2.17.2|Aggregate_Items_For_Rate_Assignment|v23.0
    - 1.2.17.3|Manage_Customer_Assignment_Hierarchy|v23.0
    - 1.2.17.4|Provide_Advice_of_Rate|v23.0
    - 1.2.17.5|Apply_Rate_Level_Discounts|v23.0
    functionalFrameworkFunctions:
    - 253|Customer_Usage_and_Charges_Report_Access|v23.0
    - 55|Price_and_Discount_Calculation|v23.0
    - 125|Charging_Event_Accumulation|v23.0
    - 126|Event_Charge/Credit_Calculation|v23.0
    - 127|Calculated_Charges/Credits_Proration|v23.0
