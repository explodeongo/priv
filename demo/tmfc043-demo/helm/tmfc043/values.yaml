image:
  repository: tmfc043-demo
  tag: "1.0.0"
  pullPolicy: Never          # image is side-loaded into k3s containerd (no registry)
namespace: synaptdi-oda-demo
nodePort: 30043              # demo API reachable at <node>:30043
# The URL the ODA API operator would publish into the component status — reachable from the
# Newman CTK docker containers. Set to the value proven reachable from the tmf docker network.
publishedBaseHost: "host.docker.internal:30043"
