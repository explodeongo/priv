# Deployed ODA Component CR (mirrors the canonical TMFC043 spec so the Component CTK's
# resolve_api_versions + deployment.js see the two MANDATORY exposed APIs — TMF642 v4 in
# coreFunction, TMF669 v4 in securityFunction). `implementation` on each specification entry
# is matched against the status coreAPIs/securityAPIs entry to resolve the runtime CTK URL.
apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  componentMetadata:
    id: TMFC043
    name: TMFC043-FaultManagement
    version: 1.0.0
    functionalBlock: CoreCommerceManagement
    status: specified
  coreFunction:
    exposedAPIs:
      - id: TMF642
        name: alarm-management-api
        required: true
        apiType: openapi
        specification:
          - name: alarm-management-api
            version: v4.0.0
            implementation: {{ .Release.Name }}-tmf642
            url: https://tmf-open-api-table-documents.s3.eu-west-1.amazonaws.com/OpenApiTable/TMF642_Alarm/4.0.0/swagger/TMF642_Alarm_Management_API_v4.0.0_swagger.json
    dependentAPIs: []
  managementFunction:
    exposedAPIs: []
  securityFunction:
    canvasSystemRole: fault-admin
    exposedAPIs:
      - id: TMF669
        name: party-role-management-api
        required: true
        apiType: openapi
        specification:
          - name: party-role-management-api
            version: v4.0.0
            implementation: {{ .Release.Name }}-tmf669
            url: https://tmf-open-api-table-documents.s3.eu-west-1.amazonaws.com/OpenApiTable/TMF669_Party_Role/4.0.0/swagger/TMF669_Party_Role_Management_API_v4.0.0_swagger.json
    dependentAPIs: []
    dependentOptionalAPIs: []
