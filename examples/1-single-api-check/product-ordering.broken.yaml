# ─────────────────────────────────────────────────────────────────────────────
# SynaptDI demo — the "BEFORE" spec. DELIBERATELY non-compliant with TM Forum.
# Open this with the SynaptDI extension + backend running on :8000, then click
# "Auto-fix" in the chat context bar (or the wand in the editor title).
# Tip: it gets rewritten in place — duplicate this file first if you want to
# re-run the demo. (product-ordering.tmf.yaml is a fixed "AFTER" reference.)
# ─────────────────────────────────────────────────────────────────────────────
openapi: 3.0.3
info:
  title: Product Ordering API
  description: Example TM Forum-style API used to demo SynaptDI compliance checking.
  version: "1.0.0"

paths:
  /productOrder:
    get:
      summary: List product orders
      operationId: listProductOrder
      # ✗ no offset/limit pagination, no fields, no sort
      responses:
        "200":
          description: A list of product orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductOrder"
    post:
      summary: Create a product order
      operationId: createProductOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductOrder"
      # ✗ create should return 201, not 200
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductOrder"

  /productOrder/{id}:
    get:
      summary: Retrieve a product order
      operationId: retrieveProductOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      # ✗ no fields parameter
      responses:
        "200":
          description: A product order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductOrder"
    delete:
      summary: Delete a product order
      operationId: deleteProductOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      # ✗ delete should return 204, not 200
      responses:
        "200":
          description: Deleted.

components:
  schemas:
    ProductOrder:
      type: object
      # ✗ no @type discriminator (TMF polymorphism); fields are not camelCase
      properties:
        id:
          type: string
        Order_Date:
          type: string
          format: date-time
        order_status:
          type: string
        ProductName:
          type: string
    # ✗ no TMF Error schema for 4xx/5xx responses
