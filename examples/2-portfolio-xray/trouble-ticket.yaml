openapi: 3.0.3
info:
  title: Trouble Ticket API
  version: 1.0.0
paths:
  /troubleTicket:
    get:
      summary: List trouble tickets
      parameters:
        - { name: offset, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: fields, in: query, schema: { type: string } }
      responses:
        '200': { description: A list of trouble tickets. }
    post:
      summary: Create a trouble ticket
      responses:
        '201': { description: Created. }
  /troubleTicket/{id}:
    get:
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: A trouble ticket. }
components:
  schemas:
    TroubleTicket:
      type: object
      properties:
        id: { type: string }
        severity: { type: string }
        status: { type: string }
        '@type': { type: string }
    Error:
      type: object
      properties:
        code: { type: string }
        reason: { type: string }
